{% extends "base.html" %}

{% block title %}Add Password - Secure Password Manager{% endblock %}

{% block content %}
    <h1>Add New Password</h1>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <input type="text" name="website" placeholder="Website name" required>
        <input type="text" name="account_username" placeholder="Account username or email" required>
        <input type="password" name="password" placeholder="Password to save" required>

        <button type="submit">Save Password</button>
    </form>

    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
{% endblock %}
