{% extends "base.html" %}

{% block title %}Password Generator - Secure Password Manager{% endblock %}

{% block content %}
    <h1>Password Generator</h1>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Password Length</label>
        <input type="number" name="length" min="8" max="32" value="16">

        <button type="submit">Generate Password</button>
    </form>

    {% if generated_password %}
        <h2>Your Password</h2>

        <input
            type="text"
            id="generatedPassword"
            value="{{ generated_password }}"
            readonly
        >

        <button type="button" onclick="copyGeneratedPassword()">
            Copy Password
        </button>
    {% endif %}

    <br>

    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>

    <script>
        function copyGeneratedPassword() {
            const passwordInput = document.getElementById("generatedPassword");
            navigator.clipboard.writeText(passwordInput.value);
            alert("Generated password copied to clipboard!");
        }
    </script>
{% endblock %}
